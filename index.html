<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Franglais Reader</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header>
        <h1>Franglais Reader</h1>
        <p>
          Reading ramps from English to French: words 1-50 are fully English, 51-150 substitute
          nouns/verbs with 10% probability, 151-300 substitute nouns/verbs with 40% probability,
          and from word 301 onward each sentence has a 20% chance to switch fully to French.
        </p>
      </header>

      <section class="panel controls">
        <button id="start-btn" type="button">Start text</button>
        <button id="next-btn" type="button">Next chunk</button>
        <button id="next-five-btn" type="button">Next 5 chunks</button>
        <button id="reset-btn" type="button">Reset</button>
        <p id="text-meta" class="muted"></p>
        <p id="progress" class="muted"></p>
      </section>

      <article id="reader" class="reader"></article>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
