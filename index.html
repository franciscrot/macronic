<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Franglais Reader</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header>
        <h1>Franglais Reader</h1>
        <p>Candide in Franglais. A macaronic experiment in language-learning.</p>
      </header>

      <section class="panel controls">
        <button id="previous-btn" type="button">Previous page</button>
        <button id="next-btn" type="button">Next page</button>
        <p id="text-meta" class="muted"></p>
        <p id="progress" class="muted"></p>
      </section>

      <article id="reader" class="reader"></article>
    </main>

    <script type="module" src="main.js"></script>
  </body>
</html>
